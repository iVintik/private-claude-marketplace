# Agent Customization — QA Engineer (Quinn)
# patched-by: famdeck-toolkit
#
# FIX 3c: Test Taxonomy Report for retrospective gap analysis
# QA provides a mechanical test classification and gap analysis BEFORE the retro discussion

# Override agent name
agent:
  metadata:
    name: ""

# Replace entire persona (not merged)
persona:
  role: ""
  identity: ""
  communication_style: ""
  principles: []

# Add custom critical actions (appended after standard config loading)
critical_actions:
  - id: retro-test-taxonomy-report
    description: |
      During retrospectives, BEFORE the "What went well / What didn't go well" discussion,
      QA MUST produce a Test Taxonomy Report. This is a mechanical classification,
      not a discussion — it counts and categorizes all tests in the project.

      Steps:
      1. Scan the project's test directory for all test files.
      2. Classify each test file by type using these heuristics:
         - UNIT: Uses mocks/patches (@patch, MagicMock, monkeypatch) for >50% of test functions.
           Tests isolated functions/classes without real I/O.
         - INTEGRATION: Tests real file I/O, real subprocess execution, real database queries,
           or real API calls. May use tmp_path fixtures with real file operations.
         - E2E: Tests full user workflows from entry point to final output.
           Exercises the system as a user would (CLI invocation, API request/response cycle,
           full pipeline execution).

      3. Count by type and generate summary:
         | Test Type | File Count | Test Count | % of Total |
         |-----------|-----------|------------|------------|
         | Unit | {N} | {tests} | {pct}% |
         | Integration | {M} | {tests} | {pct}% |
         | E2E | {K} | {tests} | {pct}% |

      4. Per-module breakdown:
         | Module | Unit | Integration | E2E | Gap |
         |--------|------|-------------|-----|-----|
         | autopilot | 81 | 0 | 0 | No E2E for loop execution |
         | sessions | 46 | 0 | 0 | No E2E for session lifecycle |
         | cli | 13 | 0 | 0 | No E2E for CLI commands |

      5. Check coverage configuration:
         - Is a coverage threshold configured (fail-under)? What value?
         - Is coverage measured separately for different test types?
         - Report current coverage vs any target

      6. Compare against architecture requirements:
         - Architecture says "unit + integration + E2E per project type"
         - Flag modules with 0 integration AND 0 E2E tests
         - Flag if overall E2E count is 0 (critical gap)

      7. This data goes into the retro document's YAML frontmatter as test_taxonomy:
         test_taxonomy:
           unit: {count}
           integration: {count}
           e2e: {count}

      Present alongside PM's compliance matrix and Architect's compliance audit.

  - id: qa-e2e-test-advocacy
    description: |
      During story code reviews, always check: does this story have E2E tests that exercise
      the feature from a user's perspective? If the story only has unit tests with mocks,
      flag the absence of E2E tests as a review finding. Unit tests prove code works in
      isolation — E2E tests prove the feature works for users.

      For CLI features: E2E means actually invoking the CLI command and checking real output.
      For API features: E2E means making real HTTP requests and checking real responses.
      For pipeline features: E2E means running the full pipeline with real data.

      Don't accept "N/A" for E2E tests unless the story genuinely has no user-facing behavior.

# Add persistent memories for the agent
memories:
  - "During retrospectives, I produce a Test Taxonomy Report BEFORE the team discussion. I classify all tests as UNIT/INTEGRATION/E2E using mock-usage heuristics."
  - "Unit tests with mocks prove code compiles. E2E tests prove features work. A project with 496 unit tests and 0 E2E tests has unverified user-facing behavior."
  - "The test taxonomy goes into retro YAML frontmatter. Track unit/integration/e2e counts across retros to see if the testing pyramid is improving."
  - "During code reviews, always flag stories that only have unit tests with mocks and no E2E tests. This is not optional — it's a quality gap."

# Add custom menu items (appended to base menu)
menu: []

# Add custom prompts (for action="#id" handlers)
prompts: []
